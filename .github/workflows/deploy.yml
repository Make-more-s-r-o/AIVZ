name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend scripts
        run: npm run typecheck --workspace scripts

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Pozn.: legacy job `deploy` (Hostinger API, vz.srv997068.hstgr.cloud) odstraněn 2026-07-02 —
  # instance je decommissioned, health-check vždy selhal a značil celý run jako failure.
  # Reálný produkční deploy je deploy-hetzner (vz.ludone.cz).
  deploy-hetzner:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      NGINX_CONTAINER: makemore-nginx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync compose file to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 23.88.61.12
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker/docker-compose.hetzner.yml"
          target: "/opt/vz/"
          strip_components: 1

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 23.88.61.12
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # docker compose pull ~400MB image občas přesáhl default 10m → Run Command Timeout
          command_timeout: 25m
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u make-more-s-r-o --password-stdin
            cd /opt/vz
            # Symlink compose file
            ln -sf docker-compose.hetzner.yml docker-compose.yml
            # Ensure .env has POSTGRES_PASSWORD
            grep -q POSTGRES_PASSWORD .env 2>/dev/null || echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            docker compose pull
            # 40 s odpovídá stop_grace_period; API má 25 s na drain + persist snapshotu.
            docker compose up -d --remove-orphans --timeout 40

      - name: Post-deploy smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: 23.88.61.12
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 3m
          script: |
            set -eu

            API_CONTAINER="vz-api"
            NGINX_CONTAINER="${{ env.NGINX_CONTAINER }}"
            BASE_URL="https://vz.ludone.cz"

            echo "Waiting for ${API_CONTAINER} to become healthy (maximum ~90 s)..."
            healthy=false
            for attempt in $(seq 1 18); do
              status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "${API_CONTAINER}" 2>/dev/null || echo missing)
              echo "Health attempt ${attempt}/18: ${status}"
              if [ "${status}" = "healthy" ]; then
                healthy=true
                break
              fi
              if [ "${attempt}" -lt 18 ]; then
                sleep 5
              fi
            done

            if [ "${healthy}" != "true" ]; then
              echo "ERROR: ${API_CONTAINER} did not become healthy in time."
              docker ps --filter "name=${API_CONTAINER}" --format 'table {{.Names}}\t{{.Status}}'
              docker inspect --format '{{json .State.Health}}' "${API_CONTAINER}" 2>/dev/null || true
              exit 1
            fi

            echo "Reloading nginx container ${NGINX_CONTAINER} to refresh upstream IPs..."
            docker exec "${NGINX_CONTAINER}" nginx -s reload

            echo "Checking public API health..."
            health_body=$(curl -fsS --max-time 15 "${BASE_URL}/api/health")
            echo "Health response: ${health_body}"
            echo "${health_body}" | grep -q '"db":"ok"' || {
              echo 'ERROR: health response does not contain "db":"ok".'
              exit 1
            }

            echo "Checking SPA root (expected HTTP 200)..."
            spa_status=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 15 "${BASE_URL}/")
            echo "SPA response status: ${spa_status}"
            if [ "${spa_status}" != "200" ]; then
              echo "ERROR: SPA root returned HTTP ${spa_status}, expected 200."
              exit 1
            fi

            echo "Checking auth guard without a token (expected HTTP 401)..."
            auth_body=$(mktemp)
            trap 'rm -f "${auth_body}"' EXIT
            auth_status=$(curl -sS -o "${auth_body}" -w '%{http_code}' --max-time 15 "${BASE_URL}/api/auth/me")
            echo "Auth response status: ${auth_status}"
            if [ "${auth_status}" != "401" ]; then
              echo "ERROR: protected endpoint returned HTTP ${auth_status}, expected 401."
              echo "Response body:"
              cat "${auth_body}"
              exit 1
            fi

            echo "Post-deploy smoke test passed."
