name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend scripts
        run: npm run typecheck --workspace scripts

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Pozn.: legacy job `deploy` (Hostinger API, vz.srv997068.hstgr.cloud) odstraněn 2026-07-02 —
  # instance je decommissioned, health-check vždy selhal a značil celý run jako failure.
  # Reálný produkční deploy je deploy-hetzner (vz.ludone.cz).
  deploy-hetzner:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync compose file to Hetzner
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 23.88.61.12
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker/docker-compose.hetzner.yml"
          target: "/opt/vz/"
          strip_components: 1

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 23.88.61.12
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # docker compose pull ~400MB image občas přesáhl default 10m → Run Command Timeout
          command_timeout: 25m
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u make-more-s-r-o --password-stdin
            cd /opt/vz
            # Symlink compose file
            ln -sf docker-compose.hetzner.yml docker-compose.yml
            # Ensure .env has POSTGRES_PASSWORD
            grep -q POSTGRES_PASSWORD .env 2>/dev/null || echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            docker compose pull
            # 40 s odpovídá stop_grace_period; API má 25 s na drain + persist snapshotu.
            docker compose up -d --remove-orphans --timeout 40
            sleep 15
            docker exec vz-api wget --spider -q http://localhost:3001/api/health

      - name: External health check
        continue-on-error: true
        run: |
          sleep 15
          curl -sf --max-time 10 "https://vz.ludone.cz/api/health" || echo "External check failed (may be DNS)"
