# VZ AI Tool — Hetzner VPS (vz.ludone.cz)
# Nginx reverse proxy (external), no Traefik
# Deploy: cd /opt/vz && docker compose up -d

services:
  vz-api:
    image: ${VZ_IMAGE:-ghcr.io/make-more-s-r-o/aivz:latest}
    container_name: vz-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_PORT=3001
      - API_TOKEN=${API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-6}
      - GOTENBERG_URL=http://vz-gotenberg:3000
      - DATABASE_URL=postgresql://vz:${POSTGRES_PASSWORD}@vz-postgres:5432/vz_warehouse
    volumes:
      - /opt/vz/data/input:/app/input
      - /opt/vz/data/output:/app/output
      - /opt/vz/data/config:/app/config
    expose:
      - "3001"
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      vz-gotenberg:
        condition: service_started
      vz-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - vz-internal
      - makemore-data_makemore

  vz-postgres:
    image: pgvector/pgvector:pg16
    container_name: vz-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vz_warehouse
      - POSTGRES_USER=vz
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /opt/vz/data/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - vz-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"

  vz-gotenberg:
    image: gotenberg/gotenberg:8
    container_name: vz-gotenberg
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GOTENBERG_API_TIMEOUT=120s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - vz-internal

networks:
  vz-internal:
    driver: bridge
  makemore-data_makemore:
    external: true
